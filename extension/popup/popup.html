<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Country Filter</title>
  <style>
    :root {
      color-scheme: light;
      --google-blue: #1a73e8;
      --google-red: #ea4335;
      --google-yellow: #fbbc04;
      --google-green: #34a853;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --surface: #f8fbff;
      --surface-strong: rgba(255, 255, 255, 0.94);
      --surface-elevated: #ffffff;
      --surface-muted: rgba(255, 255, 255, 0.88);
      --border: #d2e3fc;
      --border-danger: rgba(234, 67, 53, 0.45);
      --focus-ring: rgba(26, 115, 232, 0.18);
      --header-accent-start: rgba(26, 115, 232, 0.14);
      --header-accent-mid: rgba(251, 188, 4, 0.16);
      --header-accent-end: rgba(52, 168, 83, 0.14);
      --body-accent: rgba(251, 188, 4, 0.18);
      --body-bg-start: #f8fbff;
      --body-bg-end: #eef4ff;
      --tag-bg: #e8f0fe;
      --danger-bg-hover: rgba(234, 67, 53, 0.08);
      --button-primary-hover: #1765cc;
      --button-shadow: rgba(26, 115, 232, 0.22);
      --placeholder: #9aa0a6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --surface: #111827;
        --surface-strong: rgba(17, 24, 39, 0.94);
        --surface-elevated: #1f2937;
        --surface-muted: rgba(17, 24, 39, 0.92);
        --border: #334155;
        --border-danger: rgba(234, 67, 53, 0.55);
        --focus-ring: rgba(138, 180, 248, 0.22);
        --header-accent-start: rgba(138, 180, 248, 0.18);
        --header-accent-mid: rgba(251, 188, 4, 0.12);
        --header-accent-end: rgba(52, 168, 83, 0.16);
        --body-accent: rgba(26, 115, 232, 0.18);
        --body-bg-start: #0f172a;
        --body-bg-end: #111827;
        --tag-bg: rgba(26, 115, 232, 0.22);
        --danger-bg-hover: rgba(234, 67, 53, 0.14);
        --button-primary-hover: #1765cc;
        --button-shadow: rgba(0, 0, 0, 0.28);
        --placeholder: #80868b;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, var(--body-accent), transparent 34%),
        linear-gradient(180deg, var(--body-bg-start) 0%, var(--body-bg-end) 100%);
      overflow: hidden;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(
        135deg,
        var(--header-accent-start) 0%,
        var(--header-accent-mid) 52%,
        var(--header-accent-end) 100%
      );
    }
    .logo-mark {
      position: relative;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: conic-gradient(
        from 215deg,
        var(--google-blue) 0deg 90deg,
        var(--google-red) 90deg 170deg,
        var(--google-yellow) 170deg 255deg,
        var(--google-green) 255deg 360deg
      );
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.22);
    }
    .logo-mark::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: var(--surface-elevated);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-strong);
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--google-blue);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 10px;
    }

    /* 토큰 입력 */
    .token-row {
      display: flex;
      gap: 6px;
    }
    .token-input-wrap {
      position: relative;
      flex: 1;
    }
    .token-input-wrap input {
      width: 100%;
      padding: 7px 30px 7px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      font-family: monospace;
      color: var(--text-primary);
      background: var(--surface-elevated);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .token-input-wrap input::placeholder {
      color: var(--placeholder);
    }
    .token-input-wrap input:focus {
      border-color: var(--google-blue);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .toggle-visibility {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 0;
      font-size: 13px;
    }
    .toggle-visibility:hover { color: var(--google-blue); }
    .btn-save {
      padding: 7px 12px;
      background: var(--google-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: background-color 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-save:hover {
      background: var(--button-primary-hover);
      box-shadow: 0 6px 14px var(--button-shadow);
    }
    .token-status {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .token-status.ok { color: var(--google-green); }
    .token-status.error { color: var(--google-red); }

    /* 필터 설정 */
    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .radio-label input {
      cursor: pointer;
      accent-color: var(--google-blue);
    }

    .country-selector {
      margin-top: 10px;
      display: none;
    }
    .country-selector.visible { display: block; }

    .country-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .country-input-row select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      color: var(--text-primary);
      background: var(--surface-elevated);
    }
    .country-input-row select:focus {
      border-color: var(--google-blue);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .btn-add {
      padding: 6px 10px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--google-blue);
      font-weight: 600;
      transition: background-color 0.18s ease, border-color 0.18s ease;
    }
    .btn-add:hover {
      background: var(--tag-bg);
      border-color: var(--google-blue);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 24px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: var(--tag-bg);
      color: var(--google-blue);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--google-blue);
      padding: 0;
      font-size: 13px;
      line-height: 1;
    }

    /* 캐시 */
    .cache-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cache-info { color: var(--text-secondary); }
    .btn-clear {
      padding: 4px 10px;
      background: var(--surface-elevated);
      color: var(--google-red);
      border: 1px solid var(--border-danger);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: background-color 0.18s ease, border-color 0.18s ease;
    }
    .btn-clear:hover {
      background: var(--danger-bg-hover);
      border-color: var(--google-red);
    }

    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--surface-muted);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark" aria-hidden="true"></div>
    <h1>GitHub Country Filter</h1>
  </div>

  <!-- GitHub Token -->
  <div class="section">
    <div class="section-title">GitHub Token</div>
    <div class="token-row">
      <div class="token-input-wrap">
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
        <button class="toggle-visibility" id="toggleVisibility">👁</button>
      </div>
      <button class="btn-save" id="saveToken">저장</button>
    </div>
    <div class="token-status" id="tokenStatus"></div>
  </div>

  <!-- 필터 설정 -->
  <div class="section">
    <div class="section-title">필터 설정</div>
    <div class="radio-group">
      <label class="radio-label">
        <input type="radio" name="filterMode" value="all" checked /> 모든 국가 표시
      </label>
      <label class="radio-label">
        <input type="radio" name="filterMode" value="include" /> 선택 국가만 표시
      </label>
      <label class="radio-label">
        <input type="radio" name="filterMode" value="exclude" /> 선택 국가 제외
      </label>
    </div>

    <div class="country-selector" id="countrySelector">
      <div class="country-input-row">
        <select id="countrySelect"></select>
        <button class="btn-add" id="addCountry">추가</button>
      </div>
      <div class="tag-list" id="tagList"></div>
    </div>
  </div>

  <!-- 캐시 -->
  <div class="section">
    <div class="section-title">캐시</div>
    <div class="cache-row">
      <span class="cache-info" id="cacheInfo">불러오는 중...</span>
      <button class="btn-clear" id="clearCache">초기화</button>
    </div>
  </div>

  <div class="footer">rate limit: 인증 시 5,000 req/h</div>

  <script src="popup.js"></script>
</body>
</html>
